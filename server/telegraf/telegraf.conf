[agent]
  interval = "10s"
  flush_interval = "10s"

[[inputs.mqtt_consumer]]
  servers = ["tcp://127.0.0.1:1883"]
  topics = ["koffing/sensors"]
  data_format = "json"
  name_override = "air_quality"

[[outputs.influxdb_v3]]
  urls = ["http://127.0.0.1:8181"]
  token = "INFLUX_TOKEN_PLACEHOLDER"
  database = "koffing"
