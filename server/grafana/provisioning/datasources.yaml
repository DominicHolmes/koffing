apiVersion: 1
datasources:
  - name: InfluxDB-Koffing
    uid: influxdb-koffing
    type: influxdb
    access: proxy
    url: http://localhost:8181
    isDefault: true
    jsonData:
      version: InfluxQL
      httpMode: GET
      dbName: koffing
      httpHeaderName1: Authorization
    secureJsonData:
      httpHeaderValue1: Bearer INFLUX_TOKEN_PLACEHOLDER
